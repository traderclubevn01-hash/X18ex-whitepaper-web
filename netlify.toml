# Configuration for Netlify deployment of X18ex VitePress Whitepaper
[build]
  command = "npm run build"
  publish = ".vitepress/dist"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true
